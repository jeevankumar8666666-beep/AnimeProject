<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Project | Watch Online</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; }
        .nav { background: #111; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 1px solid #333; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { border-color: #ffb100; transform: translateY(-5px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" style="color:#ffb100; font-weight:bold; font-size: 22px; text-decoration:none;">Anime Project</a>
        <form action="/"><input name="search" placeholder="Search..." style="background:#222; color:white; border:none; padding:8px 15px; border-radius:20px;"></form>
    </nav>
    <div class="grid">
        {% for anime in animes %}
        <a href="/anime/{{ anime.mal_id }}" class="card">
            <img src="{{ anime.images.jpg.large_image_url }}">
            <div class="info"><b>{{ anime.title }}</b></div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
